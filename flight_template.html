<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vₑ</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
    font: 13px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif; color: #cfd6e4; }
  canvas { display: block; }
  #hud { position: fixed; top: 10px; left: 12px; color: #8fa3c8; font-size: 12px;
    text-shadow: 0 1px 2px #000; user-select: none; }
  #hud b { color: #fff; font-size: 14px; }
  #hud .warn { color: #e06c75; }
  #prompt { position: fixed; bottom: 96px; width: 100%; text-align: center;
    color: #ffd479; font-size: 13px; text-shadow: 0 1px 3px #000; }
  #msg { position: fixed; bottom: 120px; width: 100%; text-align: center;
    color: #9fb4d8; font-size: 13px; text-shadow: 0 1px 3px #000;
    transition: opacity .4s; opacity: 0; }
  #target { position: fixed; top: 10px; right: 12px; min-width: 150px;
    text-align: right; color: #8fa3c8; font-size: 12px;
    text-shadow: 0 1px 2px #000; display: none; user-select: none; }
  #target b { color: #fff; }
  #landed, #service { position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,.72); }
  #service { background: rgba(0,0,0,.45); }
  #landed .card, #service .card { width: 560px; max-height: 86vh; overflow-y: auto;
    background: #0c1120; border: 1px solid #2a3550;
    border-radius: 8px; padding: 20px 24px; }
  #service .card { width: 540px; box-shadow: 0 12px 48px rgba(0,0,0,.8); }
  #landed h2, #service h2 { margin: 0 0 4px; color: #fff; }
  #landed .meta, #service .meta { color: #6b7a96; font-size: 12px; margin-bottom: 10px; }
  #landed .desc { white-space: pre-wrap; color: #aab6cc; font-size: 13px; }
  #landed .hint, #service .hint { margin-top: 14px; color: #ffd479; font-size: 12px; }
  #landed img.scape { width: 100%; border-radius: 4px; margin-bottom: 10px; }
  #service table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  #service th { text-align: left; color: #6b7a96; font-size: 11px;
    font-weight: normal; border-bottom: 1px solid #26304a; padding: 2px 4px; }
  #service td { padding: 4px; font-size: 13px; border-bottom: 1px solid #171f33; }
  #service td.num { text-align: right; font-variant-numeric: tabular-nums; }
  #service td .sub { color: #6b7a96; font-size: 11px; }
  #landed button, #service button { background: #1a2338; color: #cfd6e4;
    border: 1px solid #2a3550; border-radius: 4px; padding: 2px 8px; margin: 0 1px;
    cursor: pointer; font-size: 12px; }
  #landed button.svc, #service button.svc { padding: 6px 12px; margin: 8px 6px 0 0; font-size: 13px; }
  #landed button:disabled, #service button:disabled { opacity: .35; cursor: default; }
  #landed button:hover:not(:disabled), #service button:hover:not(:disabled) { background: #24304d; }
  #landed .wallet, #service .wallet { margin-top: 10px; color: #8fa3c8; font-size: 12px; }
  #landed .wallet b, #service .wallet b { color: #fff; }
  /* classic shop layout: thumbnail grid (sliced from the original menu
     sheets, PICT 5100/6100) + detail pane with the 100×100 dialog art */
  .shop { display: flex; gap: 16px; margin-top: 10px; }
  .shopgrid { display: grid; grid-template-columns: repeat(8, 34px); gap: 2px; align-content: start; }
  .shopgrid .cell { width: 32px; height: 32px; border: 1px solid #26304a; border-radius: 3px;
    background-color: #000; cursor: pointer; image-rendering: pixelated; padding: 0; }
  .shopgrid .cell:hover { border-color: #4a5b82; }
  .shopgrid .cell.sel { border-color: #ffd479; box-shadow: 0 0 6px rgba(255,212,121,.5); }
  .shoppane { flex: 1; min-width: 200px; }
  .shoppane img { width: 100px; height: 100px; image-rendering: pixelated;
    border: 1px solid #26304a; border-radius: 4px; background: #000; float: right; margin: 0 0 8px 10px; }
  .shoppane h3 { margin: 0 0 4px; color: #fff; font-size: 15px; }
  .shoppane .row { color: #aab6cc; font-size: 12px; margin: 2px 0; }
  .shoppane .row b { color: #fff; }
  #help { position: fixed; bottom: 8px; left: 12px; color: #4d5b76; font-size: 11px; }
  #dead { position: fixed; inset: 0; display: none; align-items: center;
    justify-content: center; text-align: center; background: rgba(0,0,0,.6); }
  #dead h1 { color: #e06c75; font-size: 24px; margin-bottom: 8px; }
  #dead div { color: #ffd479; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"></div>
<div id="target"></div>
<div id="prompt"></div>
<div id="msg"></div>
<div id="landed"><div class="card" id="landedCard"></div></div>
<div id="service"><div class="card" id="serviceCard"></div></div>
<div id="dead"><div>
  <h1>Your ship has been destroyed.</h1>
  <div id="deadHint">Press R to try again</div>
</div></div>
<div id="help">← → ↑ ↓ fly · Space fire · Q/X secondary · L land · B board · N/Tab target · Y hail · I missions · M map · J jump · V sound · [ ] volume · Esc</div>
<script>/*__ENGINE__*/</script>
<script>
'use strict';

const DATA = /*__EVDATA__*/null;
const MANIFEST = /*__MANIFEST__*/null;

/* ---------------- configuration ---------------- */

const params = new URLSearchParams(location.search);

/* ---- persistence (spec: "Persistence") ----
 * The pilot auto-saves on landing and takeoff (classic saved when you
 * landed) and restores on load. Any gameplay-affecting test param puts
 * the session in test mode: no restore, no saving — your pilot is safe
 * from headless screenshot runs. ?new=1 starts a fresh pilot. */
const TEST_MODE = ['new', 'syst', 'ship', 'x', 'y', 'heading', 'ff', 'land',
  'exchange', 'outfitter', 'shipyard', 'map', 'dest', 'jump', 'tab', 'nav',
  'fire', 'bar', 'computer', 'allmissions'].some(k => params.has(k));
const SAVED = (() => {
  if (TEST_MODE) return null;
  try {
    const p = JSON.parse(localStorage.getItem('ve_pilot'));
    return p && p.v === 1 ? p : null;
  } catch { return null; }
})();

let SYSTEM_ID = SAVED ? SAVED.syst : +(params.get('syst') || 128); // Levo — the classic start
let playerShipId = SAVED ? SAVED.ship : +(params.get('ship') || 128); // Shuttlecraft

/* player economy state (spec: "Trading") — the pilot file's contents */
const COMMODITIES = ['food', 'industrial', 'medical', 'luxury', 'metal', 'equipment'];
const PRICE_MULT = { low: 0.80, medium: 1.00, high: 1.25 };
let credits = SAVED ? SAVED.credits : 10000;
const cargo = Object.fromEntries(COMMODITIES.map(c => [c, (SAVED && SAVED.cargo[c]) || 0]));
const explored = new Set(SAVED ? SAVED.explored : []);

/* mission state (spec: "Missions") — also part of the pilot file */
const missionBits = new Uint8Array(256);
if (SAVED && SAVED.bits) for (const b of SAVED.bits) missionBits[b] = 1;
let gameDay = SAVED ? (SAVED.day || 0) : 0;
const reputation = SAVED && SAVED.rep ? { ...SAVED.rep } : {}; // govtId -> number
/* active missions: resolved, live copies (not the raw records) */
let activeMissions = SAVED && SAVED.missions ? SAVED.missions.map(m => ({ ...m })) : [];

let storageWarned = false;
function savePilot(spobId) {
  if (TEST_MODE) return;
  const blob = JSON.stringify({
    v: 1, syst: SYSTEM_ID, spob: spobId, ship: playerShipId,
    credits, cargo, outfits, explored: [...explored],
    bits: [...missionBits.keys()].filter(b => missionBits[b]),
    day: gameDay, rep: reputation, missions: activeMissions,
  });
  let ok = false;
  try {
    localStorage.setItem('ve_pilot', blob);
    ok = localStorage.getItem('ve_pilot') === blob; // trust nothing on file://
  } catch {}
  if (!ok && !storageWarned) {
    storageWarned = true;
    showMsg('Warning: browser storage unavailable — your pilot will not be saved.');
  }
}
function newPilot() {
  try { localStorage.removeItem('ve_pilot'); } catch {}
  location.href = location.pathname;
}

const ships = DATA.types.ship;
const dudes = DATA.types.dude;
const systs = DATA.types.syst;

const SHIP_SPIN_BASE = 128, STELLAR_SPIN_BASE = 300;
const spinOfShip = shipId => SHIP_SPIN_BASE + (shipId - 128);
const spinOfSpob = p => STELLAR_SPIN_BASE + p.Type;

/* ---------------- sprites ---------------- */

const sprites = new Map(); // spinId -> {img, meta, ready}
function preloadSprites(spinIds) {
  for (const id of spinIds) {
    const meta = MANIFEST.spins[id];
    if (!meta || sprites.has(+id)) continue;
    const img = document.createElement('img');
    img.src = 'evassets/sprites/spin_' + id + '.png';
    img.style.display = 'none';
    document.body.appendChild(img);
    const entry = { img, meta, ready: img.complete };
    img.onload = () => { entry.ready = true; };
    sprites.set(+id, entry);
  }
}
function drawSpin(ctx, spinId, x, y, headingDeg) {
  const s = sprites.get(spinId);
  if (!s || !s.ready) return;
  const { frameW, frameH, xTiles, frames } = s.meta;
  const fi = EV.frameIndex(headingDeg, frames);
  ctx.drawImage(s.img, (fi % xTiles) * frameW, Math.floor(fi / xTiles) * frameH,
    frameW, frameH, x - frameW / 2, y - frameH / 2, frameW, frameH);
}

/* ---------------- world (per-system state) ---------------- */

let syst, spobs, aiShips, systEpoch = 0;

function spinsNeededFor(systId) {
  const s = systs[systId];
  const need = new Set([spinOfShip(playerShipId)]);
  for (const [id, p] of Object.entries(DATA.types.spob))
    if (p.System === +systId) need.add(spinOfSpob(p));
  for (let i = 1; i <= 4; i++) {
    const d = dudes[s['DudeTypes' + i]];
    if (d) for (let j = 1; j <= 4; j++)
      if (d['ShipTypes' + j] >= 128) need.add(spinOfShip(d['ShipTypes' + j]));
  }
  return need;
}

function loadSystem(systId) {
  SYSTEM_ID = +systId;
  syst = systs[SYSTEM_ID];
  explored.add(SYSTEM_ID);
  systEpoch++;
  spobs = Object.entries(DATA.types.spob)
    .filter(([, p]) => p.System === SYSTEM_ID)
    .map(([id, p]) => ({ id: +id, x: p.xPos, y: p.yPos, ...p }));
  aiShips = [];
  shots = []; beams = []; explosions = [];
  navTarget = null; shipTarget = null;
  preloadSprites(spinsNeededFor(SYSTEM_ID));
  // Landscapes for this system's spobs (default 10000+Type and custom),
  // so the planet screen never shows without its picture.
  for (const p of spobs)
    for (const id of [10000 + p.Type, p.CustPicID].filter(v => v >= 0)) {
      if (document.getElementById('scape' + id)) continue;
      const img = document.createElement('img');
      img.id = 'scape' + id;
      img.src = 'evassets/titles/PICT_' + id + '.png';
      img.style.display = 'none';
      img.onerror = () => img.remove();
      document.body.appendChild(img);
    }
  const n = Math.min(Math.max(syst.AvgShips, 2), 8);
  for (let i = 0; i < n; i++) spawnAI(false);
  // missions: AvailRandom rerolls per arrival; place this system's ships;
  // mark observe goals satisfied when we arrive in the right system.
  availRandom = {};
  resolvedOffers = {}; // fresh mission destinations/cargo/deadlines per system
  for (const A of activeMissions) {
    maybeSpawnMissionShips(A);
    if (A.shipGoal === 4 && !A.observed) {
      const sys = A.shipSyst;
      if ((sys >= 128 && sys === SYSTEM_ID) ||
          (A.travelStel && spobById(A.travelStel) && spobById(A.travelStel).System === SYSTEM_ID)) {
        A.observed = true;
        showMsg(`${A.name}: target observed — return for payment.`);
      }
    }
  }
}

/* ---------------- AI spawning (shell; see spec "Spawning") ------------- */

function weighted(pairs) {
  if (!pairs.length) return null;
  let r = Math.random() * pairs.reduce((n, [, w]) => n + w, 0);
  for (const [v, w] of pairs) { if ((r -= w) <= 0) return v; }
  return pairs[0][0];
}
function spawnAI(atEdge) {
  const pairsD = [];
  for (let i = 1; i <= 4; i++) {
    const d = syst['DudeTypes' + i], w = syst['Prob' + i];
    if (d >= 128 && dudes[d] && w > 0) pairsD.push([d, w]);
  }
  const dudeId = weighted(pairsD);
  if (dudeId == null) return;
  const pairsS = [];
  for (let j = 1; j <= 4; j++) {
    const s = dudes[dudeId]['ShipTypes' + j], w = dudes[dudeId]['Prob' + j];
    if (s >= 128 && ships[s] && w > 0) pairsS.push([s, w]);
  }
  const shipId = weighted(pairsS);
  if (shipId == null) return;
  const a = Math.random() * Math.PI * 2;
  const r = atEdge ? 2400 : 400 + Math.random() * 1200;
  const e = EV.makeShip(ships[shipId], Math.cos(a) * r, Math.sin(a) * r, Math.random() * 360);
  e.shipId = shipId;
  e.govt = dudes[dudeId].Govt;
  e.aiType = dudes[dudeId].AIType;
  e.target = spobs.length ? spobs[Math.floor(Math.random() * spobs.length)] : null;
  armShip(e, ships[shipId]);
  // hostility from govt flags (spec: "Hostility")
  const gf = e.govt >= 128 && DATA.types.govt[e.govt] && DATA.types.govt[e.govt].$sem
    ? DATA.types.govt[e.govt].$sem.flags : [];
  if ((gf.includes('alwaysAttacksPlayer') || gf.includes('xenophobic')) && e.aiType >= 3)
    e.hostile = true;
  aiShips.push(e);
}

/* ---------------- player ---------------- */

const player = EV.makeShip(ships[playerShipId],
  +(params.get('x') || 0), +(params.get('y') || 300), +(params.get('heading') || 0));
player.shipId = playerShipId;
let fuel = ships[playerShipId].Fuel;
let fuelMax = ships[playerShipId].Fuel;
let holds = ships[playerShipId].Holds;
let landedAt = null;

/* ---- audio (spec: "Audio") ----
 * Plain Audio elements (file:// safe). Browsers block playback until the
 * first user gesture; failed play()s are swallowed until then. */
let soundOn = !params.has('mute');
/* master volume, 0..1 in 10% steps ([ and ] keys), persisted */
let masterVol = (() => {
  try { const v = parseFloat(localStorage.getItem('ve_volume')); return isNaN(v) ? 1 : Math.max(0, Math.min(1, v)); }
  catch { return 1; }
})();
function setVolume(delta) {
  masterVol = Math.max(0, Math.min(1, Math.round((masterVol + delta) * 10) / 10));
  try { localStorage.setItem('ve_volume', String(masterVol)); } catch {}
  if (ambientSnd) ambientSnd.volume = Math.min(ambientSnd._baseVol * masterVol, 1);
  showMsg(`Volume ${Math.round(masterVol * 100)}%`);
  playSnd(150, 0.6); // audible reference beep at the new level
}
const sndCache = new Map();
function sndEl(id) {
  let a = sndCache.get(id);
  if (!a) { a = new Audio('evassets/sounds/snd_' + id + '.wav'); sndCache.set(id, a); }
  return a;
}
function playSnd(id, vol = 1) {
  if (!soundOn || vol * masterVol <= 0.02) return;
  const a = sndEl(id).cloneNode();
  a.volume = Math.min(vol * masterVol, 1);
  a.play().catch(() => {});
}
function loopSnd(id, vol = 1) {
  if (!soundOn || masterVol <= 0) return null;
  const a = sndEl(id).cloneNode();
  a._baseVol = vol;
  a.volume = Math.min(vol * masterVol, 1);
  a.loop = true;
  a.play().catch(() => {});
  return a;
}
const stopSnd = a => { if (a) { a.pause(); a.currentTime = 0; } };
const attenuate = (x, y) => Math.max(0, 1 - Math.hypot(x - player.x, y - player.y) / 1200);
let ambientSnd = null, klaxxonArmed = true;
function stopAllLoops() {
  stopSnd(ambientSnd); ambientSnd = null;
}

/* ---- combat state (spec: "Combat") ---- */
const weaps = DATA.types.weap;
let shots = [], beams = [], explosions = [];
let gameOver = false;

// ammo pool key for a weapon record (AmmoType 0-63 -> weapon 128+n's pool)
const poolKey = rec => rec.AmmoType >= 0 && rec.AmmoType <= 63 ? 128 + rec.AmmoType : null;

/* Give an entity combat stats + stock loadout from its shïp record. */
function armShip(e, rec) {
  e.shieldMax = rec.Shield; e.shields = rec.Shield;
  e.armorMax = rec.Armor; e.armor = rec.Armor;
  e.shieldRe = rec.ShieldRe; e.mass = Math.max(rec.Mass, 1);
  e.deathDelay = rec.DeathDelay;
  e.disableFrac = (rec.Flags & 0x0010) ? 0.10 : 1 / 3;
  e.deathT = -1; e.disabled = false; e.hostile = false; e.fleeing = false;
  e.weapons = []; e.pools = {}; e.poolCap = {};
  for (let i = 1; i <= 4; i++) {
    const t = rec['WeapType' + i];
    if (t >= 128 && weaps[t]) {
      e.weapons.push({ id: t, rec: weaps[t], n: Math.max(rec['WeapCount' + i], 1), cool: 0 });
      const pk = poolKey(weaps[t]);
      if (pk) {
        e.pools[pk] = (e.pools[pk] || 0) + Math.max(rec['AmmoLoad' + i], 0);
        e.poolCap[pk] = (e.poolCap[pk] || 0) + Math.max(rec['AmmoLoad' + i], 0);
      }
    }
  }
  return e;
}

/* Player loadout = stock + outfitter weapons/ammo (rebuilt on refit). */
function rebuildPlayerWeapons() {
  armShipKeepingCondition(player, effectiveShip());
  for (const [oid, n] of Object.entries(outfits)) {
    const o = DATA.types.outf[oid];
    if (!o || !n || !o.$sem) continue;
    if (o.$sem.modType === 'weapon' && weaps[o.ModVal]) {
      const existing = player.weapons.find(w => w.id === o.ModVal);
      if (existing) existing.n += n;
      else player.weapons.push({ id: o.ModVal, rec: weaps[o.ModVal], n, cool: 0 });
    } else if (o.$sem.modType === 'ammunition' && weaps[o.ModVal]) {
      const pk = poolKey(weaps[o.ModVal]) ?? o.ModVal;
      player.pools[pk] = (player.pools[pk] || 0) + n;
      player.poolCap[pk] = (player.poolCap[pk] || 0) + (o.Max > 0 ? o.Max : n);
    }
  }
  if (!player.weapons.some(w => w === player.selSecondary))
    player.selSecondary = player.weapons.find(w => w.rec.MiscFlags & 2) || null;
}
function armShipKeepingCondition(e, s) {
  const frac = e.shieldMax ? e.shields / e.shieldMax : 1;
  const afrac = e.armorMax ? e.armor / e.armorMax : 1;
  armShip(e, { ...ships[playerShipId], Shield: s.rec.Shield, Armor: s.rec.Armor });
  e.shields = e.shieldMax * frac;
  e.armor = e.armorMax * afrac;
}

const clampArc = (aim, base, arc) => {
  let d = EV.norm(aim - base);
  if (d > 180) d -= 360;
  return EV.norm(base + Math.max(-arc, Math.min(arc, d)));
};
function leadAim(e, t, shotSpeed) {
  const dist = Math.hypot(t.x - e.x, t.y - e.y);
  const dt = shotSpeed > 0 ? dist / shotSpeed : 0;
  return EV.bearing(t.x + t.vx * dt - e.x, t.y + t.vy * dt - e.y);
}

function fire(e, target, primary) {
  for (const w of e.weapons) {
    const sec = (w.rec.MiscFlags & 2) !== 0;
    if (primary ? sec : w !== e.selSecondary) continue;
    if (w.cool > 0) continue;
    const g = w.rec.Guidance;
    if (g === 99) continue; // fighter bays: a later milestone
    const pk = poolKey(w.rec);
    if (g === 0 || g === 3) { // beam
      if (pk && !((e.pools[pk] || 0) > 0)) continue;
      if (pk) e.pools[pk]--;
      beams.push({ owner: e, rec: w.rec, life: w.rec.Count, turreted: g === 3, target });
      w.cool = w.rec.Reload + w.rec.Count;
      if (w.rec.Sound >= 0) playSnd(200 + w.rec.Sound, attenuate(e.x, e.y));
      continue;
    }
    let fired = false;
    for (let i = 0; i < w.n; i++) {
      if (pk) { if ((e.pools[pk] || 0) < 1) break; e.pools[pk]--; }
      let aim = e.heading;
      if ((g === 1 || g === 2 || g === 4) && target) aim = leadAim(e, target, EV.shotSpeedOf(w.rec));
      if (g === 7 || g === 8) {
        const base = g === 7 ? e.heading : EV.norm(e.heading + 180);
        aim = target ? clampArc(leadAim(e, target, EV.shotSpeedOf(w.rec)), base, 45) : base;
      }
      aim = EV.norm(aim + (Math.random() * 2 - 1) * w.rec.Inaccuracy);
      const shot = EV.makeShot(w.rec, e, aim);
      shot.owner = e;
      shot.homing = (g === 1 || g === 2) ? target : null;
      shots.push(shot);
      fired = true;
    }
    if (fired) {
      w.cool = w.rec.Reload;
      if (w.rec.Sound >= 0) playSnd(200 + w.rec.Sound, attenuate(e.x, e.y));
    }
  }
}

function spawnExplosion(x, y, type) {
  const spin = 400 + Math.max(0, Math.min(type, 2));
  const meta = MANIFEST.spins[spin];
  if (meta) explosions.push({ x, y, spin, f: 0, frames: meta.frames, tick: 0 });
}

function grudge(victim, attacker) {
  if (attacker !== player || !victim.aiType) return;
  const react = s => {
    if (s.aiType >= 3 || s.aiType === 2) s.hostile = true;
    else s.fleeing = true;
  };
  react(victim);
  for (const s of aiShips) if (s.govt === victim.govt && s.govt >= 128) react(s);
}

function hitShip(victim, rec, heading, attacker) {
  const result = EV.applyDamage(victim, rec);
  const kick = rec.Impact / (10 * victim.mass);
  victim.vx += Math.sin(EV.rad(heading)) * kick;
  victim.vy -= Math.cos(EV.rad(heading)) * kick;
  if (rec.ExplodType >= 0)
    playSnd(rec.ExplodType >= 1 ? 300 : 301, attenuate(victim.x, victim.y) * 0.8);
  if (result === 'destroyed' && victim.deathT < 0) {
    victim.deathT = Math.max(victim.deathDelay, 1);
    playSnd(302, attenuate(victim.x, victim.y)); // breaking up
  } else if (result === 'disabled' && !victim.disabled) {
    victim.disabled = true;
    if (victim.misnId != null && attacker === player) onMissionShipDisabled(victim);
  }
  grudge(victim, attacker);
}

function shipHalf(e) {
  const m = MANIFEST.spins[spinOfShip(e.shipId)];
  return m ? Math.max(m.frameW, m.frameH) / 2 : 16;
}

/* ---- outfits (spec-adjacent; oütf ModType effects from semantics.js) ----
 * outfits: outf id -> count. Effective ship stats = base shïp record plus
 * every owned outfit's effect; outfit Mass consumes the hull's FreeMass. */
const outfits = {};
if (SAVED && SAVED.outfits) Object.assign(outfits, SAVED.outfits);
function effectiveShip() {
  const rec = { ...ships[playerShipId] };
  let h = rec.Holds, fm = rec.Fuel, massUsed = 0;
  for (const [id, n] of Object.entries(outfits)) {
    const o = DATA.types.outf[id];
    if (!o || !n) continue;
    massUsed += o.Mass * n;
    switch (o.$sem && o.$sem.modType) {
      case 'cargoSpace':     h += o.ModVal * n; break;
      case 'fuelCapacity':   fm += o.ModVal * n; break;
      case 'shieldCapacity': rec.Shield += o.ModVal * n; break;
      case 'armor':          rec.Armor += o.ModVal * n; break;
      case 'accelBoost':     rec.Accel += o.ModVal * n; break;
      case 'speedBoost':     rec.Speed += o.ModVal * n; break;
      case 'turnBoost':      rec.Maneuver += o.ModVal * n; break;
    }
  }
  return { rec, holds: h, fuelMax: fm, massUsed,
           freeMass: ships[playerShipId].FreeMass - massUsed };
}
function applyShipStats() {
  const s = effectiveShip();
  player.rec = s.rec;
  player.maxSpeed = EV.maxSpeedOf(s.rec);
  player.accel = EV.accelOf(s.rec);
  player.turn = EV.turnOf(s.rec);
  holds = s.holds;
  fuelMax = s.fuelMax;
  fuel = Math.min(fuel, fuelMax);
  rebuildPlayerWeapons(); // loadout + shield/armor maxes follow the refit
}

/* jump state: null | {destId, phase:'engage'|'streak', t} */
let jump = null;
let mapOpen = false;
let jumpDest = null; // selected destination system id

function linkedSystems() {
  const out = [];
  for (let i = 1; i <= 16; i++) {
    const c = syst['Con' + i];
    if (c >= 128 && systs[c]) out.push(c);
  }
  return out;
}

function mapBearingTo(destId) {
  const a = systs[SYSTEM_ID], b = systs[destId];
  return EV.bearing(b.xPos - a.xPos, b.yPos - a.yPos);
}

function nearestSpobInfo() {
  let best = null, bd = Infinity;
  for (const p of spobs) {
    const d = Math.hypot(p.x - player.x, p.y - player.y);
    if (d < bd) { bd = d; best = p; }
  }
  return { spob: best, dist: bd };
}
let warpSnd = null;
function beginJump() {
  if (jump || landedAt) return;
  if (jumpDest == null || !linkedSystems().includes(jumpDest)) return;
  if (fuel < EV.JUMP_FUEL) { showMsg('Not enough fuel to jump.'); return; }
  const near = nearestSpobInfo();
  if (near.spob && near.dist < EV.JUMP_MIN_DIST) {
    showMsg(`You are too close to ${near.spob.name} to engage your hyperdrive.`);
    return;
  }
  jump = { destId: jumpDest, phase: 'engage', t: 0 };
  warpSnd = soundOn ? sndEl(128).cloneNode() : null; // Warp Up: 8.3s spin-up
  if (warpSnd) { warpSnd.play().catch(() => {}); }
}
function abortJump() {
  jump = null;
  stopSnd(warpSnd); warpSnd = null;
}
function completeJump() {
  const from = SYSTEM_ID;
  gameDay++;                    // a day passes each hyperspace jump (spec)
  loadSystem(jump.destId);
  // placeAtArrival wants the inbound bearing (origin → dest); from the
  // destination, mapBearingTo(origin) is the reverse bearing, so flip it.
  EV.placeAtArrival(player, EV.norm(mapBearingTo(from) + 180));
  fuel -= EV.JUMP_FUEL;
  jump = null; jumpDest = null;
  checkExpiredMissions();
  warpSnd = null; // Warp Up ends naturally as the streak completes
  playSnd(130); // Warp Out
}

const keys = {};

  if (k === 'm') { mapOpen = !mapOpen; }
  if (k === 'j') { if (mapOpen) mapOpen = false; beginJump(); }
  if (k === 'n' && gameOver) { newPilot(); return; }
  if (k === 'n' && !landedAt) cyclePlanetTarget();

  if (k === 'b' && !landedAt) boardTarget();
  if (k === 'i' && !landedAt) showMissionBriefing();
  if (k === 'r' && gameOver) location.reload();

    else if (shipTarget) { shipTarget = null; showMsg('Target cleared.'); }

const distTo = o => Math.hypot(o.x - player.x, o.y - player.y);

function nearestLandable() {
  let best = null, bd = Infinity;
  for (const p of spobs) {
    if (p.$sem && !p.$sem.canLand) continue;
    const d = distTo(p);
    if (d < bd) { bd = d; best = p; }
  }

}
/* Cycling past the farthest target clears the selection (un-target). */
function cyclePlanetTarget() {
  if (!spobs.length) { showMsg('No stellar objects in this system.'); return; }
  const sorted = [...spobs].sort((a, b) => distTo(a) - distTo(b));
  const i = navTarget ? sorted.indexOf(navTarget) : -1;
  navTarget = (i + 1 < sorted.length) ? sorted[i + 1] : null;
  if (!navTarget) showMsg('Navigation target cleared.');
  playSnd(150, 0.5);
}
function cycleShipTarget() {
  if (!aiShips.length) { showMsg('No ships on scope.'); shipTarget = null; return; }
  const sorted = [...aiShips].sort((a, b) => distTo(a) - distTo(b));
  const i = shipTarget ? sorted.indexOf(shipTarget) : -1;
  shipTarget = (i + 1 < sorted.length) ? sorted[i + 1] : null;
  if (!shipTarget) showMsg('Target cleared.');
  playSnd(150, 0.5);
}

/* hail (Y): govt greeting lists live at STR# 7000+(govt-128), generic at

function pickLine(listId) {

    .filter(s => s && s !== '*');

}
function hail() {

/* ---- trading (spec: "Trading") ---- */

const cargoNames = DATA.strings[4000].list.slice(0, 6);
const basePrices = DATA.strings[4004].list.slice(0, 6).map(Number);
const missionCargoUsed = () => activeMissions.reduce((n, a) => n + (a.cargoLoaded ? a.cargoQty : 0), 0);
const cargoUsed = () => COMMODITIES.reduce((n, c) => n + cargo[c], 0) + missionCargoUsed();

function priceAt(spob, i) {
  const lvl = spob.$sem && spob.$sem.prices[COMMODITIES[i]];
  return lvl && PRICE_MULT[lvl] ? Math.round(basePrices[i] * PRICE_MULT[lvl]) : null;
}
function trade(i, qty) {
  if (!landedAt) return;
  const price = priceAt(landedAt, i);
  if (price == null) return;
  if (qty > 0) qty = Math.min(qty, holds - cargoUsed(), Math.floor(credits / price));
  else qty = Math.max(qty, -cargo[COMMODITIES[i]]);
  cargo[COMMODITIES[i]] += qty;
  credits -= qty * price;
  rerenderService();
}

/* ---- outfitter ---- */

const outfitName = id => DATA.strings[5000].list[id - 128] ||
  (DATA.types.outf[id] ? 'outfit ' + id : null);

function buyOutfit(id, qty) {
  const o = DATA.types.outf[id];
  if (!o) return;
  const s = effectiveShip();
  if (qty > 0) {
    if (o.Max > 0 && (outfits[id] || 0) + qty > o.Max) qty = o.Max - (outfits[id] || 0);
    if (o.Mass > 0) qty = Math.min(qty, Math.floor(s.freeMass / o.Mass));
    if (o.Cost > 0) qty = Math.min(qty, Math.floor(credits / o.Cost));
    if (qty <= 0) return;
  } else {
    qty = Math.max(qty, -(outfits[id] || 0));
    if (qty === 0) return;
  }
  outfits[id] = (outfits[id] || 0) + qty;
  if (!outfits[id]) delete outfits[id];
  credits -= qty * o.Cost;
  applyShipStats();
  // cargo can't exceed a shrunken hold: dump overflow (paid nothing for it)
  while (cargoUsed() > holds) {
    const c = COMMODITIES.find(c => cargo[c] > 0);
    if (!c) break;
    cargo[c]--;
  }
  rerenderService();
}

/* ================= missions (spec: "Missions") ================= */

const misns = DATA.types.misn;
const govts = DATA.types.govt;
const MISN_ALL = params.has('allmissions'); // test: ignore AvailRandom roll
const allSpobs = () => Object.entries(DATA.types.spob).map(([id, p]) => ({ id: +id, ...p }));
const spobById = id => DATA.types.spob[id];
const systOfSpob = p => p && systs[p.System];
const bitReq = (v, want) => { // AvailBitSet-style code check
  if (v < 0) return true;
  if (v >= 1000) return !missionBits[v - 1000];
  return !!missionBits[v];
};
function setBitCode(v) { // CompBitSet-style: 0-511 set, 1000-1511 clear
  if (v == null || v < 0) return;      // classic misn lacks some Nova bit fields
  if (v >= 1000) missionBits[v - 1000] = 0; else missionBits[v] = 1;
}
const field = (m, k, dflt = -1) => (m[k] == null ? dflt : m[k]); // classic vs Nova

// govt relations (from $sem flags we don't have allies as data; use gövt Ally/Enemy)
function govtAllies(g) { const r = govts[g]; return r ? [r.Ally].filter(a => a >= 128) : []; }
function govtEnemies(g) { const r = govts[g]; return r ? [r.Enemy].filter(a => a >= 128) : []; }

/* Resolve an AvailStel/TravelStel/ReturnStel code to a concrete spob id.
 * `here` is the spob the mission is being offered/accepted at. Returns a
 * spob id, or null if unresolvable. */
function resolveStel(code, here) {
  const inhabited = () => allSpobs().filter(p => p.$sem && !p.$sem.uninhabited && p.$sem.canLand);
  const uninhab = () => allSpobs().filter(p => p.$sem && p.$sem.uninhabited);
  const pick = arr => arr.length ? arr[Math.floor(Math.random() * arr.length)].id : null;
  if (code === -1) return null;              // no specific dest / any (caller decides)
  if (code === -2) return pick(inhabited());
  if (code === -3) return pick(uninhab());
  if (code === -4) return here ? here.id : null;
  if (code >= 128 && code <= 1627) return spobById(code) ? code : null;
  const govtPick = (g, filter) => pick(inhabited().filter(p => filter(p.Govt, g)));
  if (code >= 9999 && code <= 10127) return govtPick(code - 9999, (pg, g) => pg === g);
  if (code >= 15000 && code <= 15127) return govtPick(code - 15000, (pg, g) => govtAllies(g).includes(pg));
  if (code >= 20000 && code <= 20127) return govtPick(code - 20000, (pg, g) => pg !== g);
  if (code >= 25000 && code <= 25127) return govtPick(code - 25000, (pg, g) => govtEnemies(g).includes(pg));
  return null;
}

/* Does mission m's AvailStel match the spob `p`? */
function availStelMatch(code, p) {
  if (code === -1) return p.$sem && !p.$sem.uninhabited && p.$sem.canLand;
  if (code >= 128 && code <= 1627) return p.id === code;
  const g = c => code - c;
  if (code >= 9999 && code <= 10127) return p.Govt === g(9999);
  if (code >= 15000 && code <= 15127) return govtAllies(g(15000)).includes(p.Govt);
  if (code >= 20000 && code <= 20127) return p.Govt !== g(20000);
  if (code >= 25000 && code <= 25127) return govtEnemies(g(25000)).includes(p.Govt);
  return false;
}

/* Which goal types can we actually complete? Others aren't offered. */
function goalSupported(m) {
  if (m.ShipCount > 0 && m.ShipGoal >= 0) return [0, 1, 2, 3, 4, 5, 6].includes(m.ShipGoal);
  return true; // cargo delivery / plain go-to
}
function playerAI() { return ships[playerShipId].InherentAI; }

/* Is mission m available at spob p (in this system), for the given loc? */
function missionAvailable(m, p, loc) {
  if (m.AvailLoc !== loc) return false;
  if (loc === 2) return false;               // ship-offered: deferred
  if (!goalSupported(m)) return false;
  if (!availStelMatch(m.AvailStel, p)) return false;
  if (!bitReq(m.AvailBitSet)) return false;
  if (m.AvailBitClr >= 0 && missionBits[m.AvailBitClr]) return false;
  if (m.AvailRating > 0) return false;       // combat rating not tracked yet
  if (activeMissions.some(a => a.id === m.id)) return false;
  const ai = playerAI();
  if ((m.Flags & 0x2000) && ai <= 2) return false;
  if ((m.Flags & 0x4000) && ai >= 3) return false;
  const ast = m.AvailShipType;
  if (ast >= 128 && ast <= 255 && playerShipId !== ast) return false;
  if (ast >= 1128 && ast <= 1255 && playerShipId === ast - 1000) return false;
  if (ast >= 2128 && ast <= 2255 && ships[playerShipId].InherentGovt !== ast - 2000) return false;
  // AvailRandom rerolled per system arrival, cached on the spob-visit
  if (!MISN_ALL && m.AvailRandom > 0 && m.AvailRandom < 100) {
    availRandom[m.id] = availRandom[m.id] ?? (Math.random() * 100);
    if (availRandom[m.id] >= m.AvailRandom) return false;
  }
  return true;
}
let availRandom = {}; // misnId -> rolled %, reset each system arrival

function offeredMissions(p, loc) {
  const out = [];
  for (const [id, m] of Object.entries(misns))
    if (missionAvailable(m, p, +loc === loc ? loc : loc)) out.push({ id: +id, ...m });
  // critical missions (Flags 0x1000) first, else by id
  out.sort((a, b) => (b.Flags & 0x1000) - (a.Flags & 0x1000) || a.id - b.id);
  return out;
}

/* A game "date": gameDay counts days since a fixed epoch. Classic EV shows
 * real calendar dates; we render day N of an in-fiction year for flavor. */
function formatDate(day) {
  const YEAR0 = 1177, DPY = 365;
  const y = YEAR0 + Math.floor(day / DPY);
  return `day ${day % DPY + 1}, NC ${y}`;
}

/* Substitute EV mission text placeholders from a resolved offer/mission A.
 * (See the bible's token table: <DST> <DSY> <RST> <RSY> <CT> <CQ> <DL> ...) */
function subst(text, A) {
  if (!text) return text;
  const stel = id => (id != null ? stelName(id) : null);
  const sysOf = id => { const p = spobById(id); const s = p && systs[p.System]; return s && s.name; };
  const map = {
    DST: (A && stel(A.travelStel)) || 'your destination',
    DSY: (A && sysOf(A.travelStel)) || 'the target system',
    RST: (A && stel(A.returnStel)) || (A && stel(A.travelStel)) || 'your destination',
    RSY: (A && sysOf(A.returnStel)) || (A && sysOf(A.travelStel)) || 'the target system',
    CT:  (A && A.cargoName) || 'cargo',
    // null-check, not truthiness: a legitimate quantity of 0 must render as
    // "0", not fall through to "the".
    CQ:  A && A.cargoQty != null ? String(A.cargoQty) : 'the',
    DL:  A && A.deadline != null ? formatDate(A.deadline) : 'the deadline',
    PN:  'Captain',
    PSN: ships[playerShipId] ? ships[playerShipId].name : 'your ship',
  };
  return text.replace(/<(DST|DSY|RST|RSY|CT|CQ|DL|PN|PSN)>/g, (_, k) => map[k]);
}
const descText = (id, A) => {
  const d = DATA.types.desc[id];
  return d && d.Description ? subst(d.Description, A) : '';
};
/* Mission names carry tokens too (e.g. "Ferry Passengers to <DST>"). */
const misnName = (m, A) => subst(m.name, A);
const misnCargoName = m => {
  if (m.CargoType < 0) return null;
  if (m.CargoType === 1000) return DATA.strings[4000].list[Math.floor(Math.random() * 6)];
  return DATA.strings[4000].list[m.CargoType] || 'cargo';
};

/* Resolve a mission's random fields ONCE per offer, so the briefing shows
 * the real destination/cargo/deadline and accepting yields the same thing
 * (classic EV fixes these when the mission is first shown). Cached by id,
 * per system visit (cleared alongside availRandom in loadSystem). */
let resolvedOffers = {};
function getOffer(m, here) {
  if (resolvedOffers[m.id]) return resolvedOffers[m.id];
  const qty = m.CargoQty <= -2 ? Math.round(Math.abs(m.CargoQty) * (0.5 + Math.random()))
            : Math.max(m.CargoQty, 0);
  const o = {
    id: m.id,
    travelStel: resolveStel(m.TravelStel, here),
    returnStel: m.ReturnStel === -1 ? null : resolveStel(m.ReturnStel, here),
    cargoName: misnCargoName(m),
    cargoQty: qty,
    deadline: m.TimeLimit > 0 ? gameDay + m.TimeLimit : null,
  };
  resolvedOffers[m.id] = o;
  return o;
}

/* Accept a mission at spob `here`: resolve destinations, load cargo,
 * spawn any special ships if their system is the current one. */
function acceptMission(id, here) {
  const m = misns[id];
  const offer = getOffer(m, here); // reuse what the briefing showed
  const A = {
    id, name: m.name,
    accepted: gameDay,
    travelStel: offer.travelStel,
    returnStel: offer.returnStel,
    cargoName: offer.cargoName, cargoQty: offer.cargoQty,
    cargoLoaded: false,
    pickupMode: m.PickupMode, dropoffMode: m.DropoffMode,
    shipGoal: m.ShipCount > 0 ? m.ShipGoal : -1,
    shipsLeft: m.ShipCount > 0 ? m.ShipCount : 0,
    shipTotal: m.ShipCount > 0 ? m.ShipCount : 0,
    shipSyst: m.ShipSyst, shipDude: m.ShipDude, shipBehav: m.ShipBehav, shipNameID: m.ShipNameID,
    observed: false,
    timeLimit: m.TimeLimit,
    deadline: offer.deadline,
  };
  // prepaid outfit (PayVal -30128-g)
  if (m.PayVal >= -30255 && m.PayVal <= -30128) {
    const oid = -m.PayVal - 30000;
    if (DATA.types.outf[oid]) { outfits[oid] = (outfits[oid] || 0) + 1; applyShipStats(); }
  }
  // cargo picked up at accept
  if (A.cargoName && A.pickupMode === 0) A.cargoLoaded = true;
  activeMissions.push(A);
  maybeSpawnMissionShips(A);
  showMsg(`Mission accepted: ${misnName(m, A)}`);
}

function abortMission(id) {
  const i = activeMissions.findIndex(a => a.id === id);
  if (i < 0) return;
  const m = misns[id];
  const A = activeMissions[i];
  if (m.Flags & 0x0040) adjustRep(m.CompGovt, -5 * m.CompReward); // abort reversal
  activeMissions.splice(i, 1);
  // clear its mission ships from the system
  aiShips = aiShips.filter(s => s.misnId !== id);
  showMsg(`Mission abandoned: ${misnName(m, A)}`);
}

function adjustRep(govt, amt) {
  if (govt < 0 || !amt) return;
  reputation[govt] = (reputation[govt] || 0) + amt;
}

/* Spawn a mission's special ships if their target system is the one we're
 * in (called on accept and on each system load). */
function maybeSpawnMissionShips(A) {
  if (A.shipGoal < 0 || A.shipsLeft <= 0) return;
  const sys = A.shipSyst;
  const inThisSystem =
    sys === -6 || sys === -1 ||                             // follow / initial
    (sys >= 128 && sys <= 1127 && sys === SYSTEM_ID) ||
    (A.travelStel && systOfSpob(spobById(A.travelStel)) && sys === -3 &&
       spobById(A.travelStel).System === SYSTEM_ID) ||
    (A.returnStel && sys === -4 && spobById(A.returnStel).System === SYSTEM_ID);
  if (!inThisSystem) return;
  if (aiShips.some(s => s.misnId === A.id)) return; // already present
  const dude = dudes[A.shipDude];
  if (!dude) return;
  for (let i = 0; i < A.shipsLeft; i++) {
    const shipId = weighted(dudeShipPairs(dude));
    if (shipId == null) continue;
    const a = Math.random() * Math.PI * 2, r = 900 + Math.random() * 700;
    const e = EV.makeShip(ships[shipId], player.x + Math.cos(a) * r, player.y + Math.sin(a) * r, Math.random() * 360);
    e.shipId = shipId; e.govt = dude.Govt; e.aiType = 3;
    e.misnId = A.id;
    e.misnGoal = A.shipGoal;
    e.target = spobs.length ? spobs[Math.floor(Math.random() * spobs.length)] : null;
    armShip(e, ships[shipId]);
    // goal-specific setup (spec: "Mission ship goals")
    if (A.shipGoal === 5) { e.disabled = true; e.shields = 0; } // Rescue: start disabled
    if (A.shipGoal === 3) {                                    // Escort: protect, head out
      e.escort = true; e.aiType = 1;                          // flee-style: run for the exit
    } else if (A.shipBehav === 0 || A.shipBehav === 10) {
      e.hostile = true;                                       // attack player
    }
    if (A.shipNameID >= 128 && DATA.strings[A.shipNameID])
      e.misnName = DATA.strings[A.shipNameID].list[i % DATA.strings[A.shipNameID].list.length];
    aiShips.push(e);
  }
}
function dudeShipPairs(dude) {
  const out = [];
  for (let i = 1; i <= 4; i++) {
    const s = dude['ShipTypes' + i], w = dude['Prob' + i];
    if (s >= 128 && ships[s] && w > 0) out.push([s, w]);
  }
  return out;
}

/* Called when a mission ship is destroyed (from hitShip). */
function onMissionShipDestroyed(s) {
  const A = activeMissions.find(a => a.id === s.misnId);
  if (!A) return;
  // Escort: a lost ship fails the mission outright (spec).
  if (A.shipGoal === 3) {
    A.escortFailed = true;
    showMsg(`${misnName(misns[A.id], A)}: escort lost — mission failed.`);
    return;
  }
  A.shipsLeft--;
  // Board/Rescue want the ship boarded, not destroyed — killing it fails.
  if ((A.shipGoal === 2 || A.shipGoal === 5) && A.shipsLeft < A.shipTotal)
    A.captureLost = true;
  if (A.shipsLeft <= 0 && (A.shipGoal === 0 || A.shipGoal === 6))
    showMsg(`${misnName(misns[A.id], A)}: objective complete — return for payment.`);
}

/* Called when a mission ship becomes disabled (from hitShip). Disable goal
 * counts it done; Board/Rescue now allow boarding. */
function onMissionShipDisabled(s) {
  const A = activeMissions.find(a => a.id === s.misnId);
  if (!A) return;
  if (A.shipGoal === 1) { // Disable but don't destroy
    if (!s.misnCounted) { s.misnCounted = true; A.shipsLeft--; }
    if (A.shipsLeft <= 0) showMsg(`${misnName(misns[A.id], A)}: targets disabled — return for payment.`);
  } else if (A.shipGoal === 2) {
    showMsg(`Target disabled — approach and press B to board.`);
  }
}

/* Board the nearest disabled mission ship (spec: "Boarding"). B key. */
function boardTarget() {
  if (landedAt || gameOver) return;
  let best = null, bd = 50;
  for (const s of aiShips) {
    if (s.misnId == null || !s.disabled || s.deathT >= 0) continue;
    if (!(s.misnGoal === 2 || s.misnGoal === 5)) continue;
    const d = Math.hypot(s.x - player.x, s.y - player.y);
    if (d < bd) { bd = d; best = s; }
  }
  if (!best) { showMsg('No disabled ship in boarding range.'); return; }
  if (Math.hypot(player.vx, player.vy) > EV.LAND_SPEED * 2) { showMsg('Slow down to board.'); return; }
  const A = activeMissions.find(a => a.id === best.misnId);
  aiShips.splice(aiShips.indexOf(best), 1);
  if (best === shipTarget) shipTarget = null;
  if (A) {
    A.shipsLeft--;
    showMsg(A.shipsLeft > 0
      ? `${misnName(misns[A.id], A)}: boarded (${A.shipsLeft} to go).`
      : `${misnName(misns[A.id], A)}: objective complete — return for payment.`);
  }
}

/* An escort ship reached its destination safely. */
function onMissionEscortArrived(s) {
  const A = activeMissions.find(a => a.id === s.misnId);
  if (!A) return;
  if (!aiShips.some(x => x.misnId === A.id && x !== s))
    showMsg(`${misnName(misns[A.id], A)}: escort delivered — return for payment.`);
}
/* Escort goal met once all escort ships have arrived (none remain) unharmed. */
function escortArrived(A) {
  return A.shipGoal === 3 && !A.escortFailed &&
    !aiShips.some(s => s.misnId === A.id);
}

/* Goal met? (used at ReturnStel). */
function goalMet(A) {
  if (A.shipGoal === 0 || A.shipGoal === 6) return A.shipsLeft <= 0;
  if (A.shipGoal === 1) return A.shipsLeft <= 0 && !A.captureLost;
  if (A.shipGoal === 2 || A.shipGoal === 5) return A.shipsLeft <= 0 && !A.captureLost;
  if (A.shipGoal === 3) return escortArrived(A); // all escorts must arrive, not just survive
  if (A.shipGoal === 4) return A.observed;
  return true; // cargo / go-to: arriving at returnStel is the goal
}
/* An unwinnable goal (target killed / escort lost) should fail at ReturnStel
 * even without a time limit, rather than stranding the mission forever. */
function goalFailed(A) {
  return !!A.captureLost || !!A.escortFailed;
}

/* Handle landing on spob p for every active mission: cargo pickup/dropoff
 * at TravelStel, and completion/failure at ReturnStel. Returns dialog
 * chunks to append to the planet screen. */
function missionLandingEvents(p) {
  const notes = [];
  for (const A of [...activeMissions]) {
    const m = misns[A.id];
    // cargo pickup at TravelStel
    if (A.cargoName && !A.cargoLoaded && A.pickupMode === 1 && A.travelStel === p.id) {
      A.cargoLoaded = true;
      notes.push(descText(m.LoadCargText) || `Loaded ${A.cargoQty}t of ${A.cargoName}.`);
    }
    // cargo dropoff at TravelStel
    if (A.cargoName && A.cargoLoaded && A.dropoffMode === 0 && A.travelStel === p.id) {
      A.cargoLoaded = false;
      notes.push(descText(m.DropCargText, A) || `Delivered ${A.cargoQty}t of ${A.cargoName}.`);
    }
    // completion / failure at ReturnStel
    const ret = A.returnStel != null ? A.returnStel : (A.travelStel === p.id ? p.id : null);
    const isReturn = (A.returnStel != null && A.returnStel === p.id) ||
                     (A.returnStel == null && A.travelStel === p.id);
    if (isReturn) {
      const expired = A.timeLimit > 0 && gameDay - A.accepted > A.timeLimit;
      if (!expired && !goalFailed(A) && goalMet(A)) {
        notes.push(descText(m.CompText, A) || `Mission complete: ${misnName(m, A)}.`);
        payMission(m);
        setBitCode(m.CompBitSet); setBitCode(m.CompBitSet2); setBitCode(m.CompBitSet4);
        adjustRep(m.CompGovt, m.CompReward);
        removeMission(A.id);
      } else if (expired || goalFailed(A) || m.CanAbort) {
        notes.push(descText(m.FailText, A) || `Mission failed: ${misnName(m, A)}.`);
        setBitCode(m.FailBitSet); setBitCode(m.FailBitSet2);
        adjustRep(m.CompGovt, -Math.round(m.CompReward / 2));
        removeMission(A.id);
      }
    }
  }
  return notes;
}
function removeMission(id) {
  activeMissions = activeMissions.filter(a => a.id !== id);
  aiShips = aiShips.filter(s => s.misnId !== id);
}
function checkExpiredMissions() {
  for (const A of [...activeMissions]) {
    if (A.timeLimit > 0 && gameDay - A.accepted > A.timeLimit) {
      const m = misns[A.id];
      setBitCode(m.FailBitSet); setBitCode(m.FailBitSet2);
      adjustRep(m.CompGovt, -Math.round(m.CompReward / 2));
      removeMission(A.id);
      showMsg(`Mission failed (out of time): ${misnName(misns[A.id], A)}`);
    }
  }
}
/* I in flight: briefing for the active missions (QuickBrief). */
function showMissionBriefing() {
  if (!activeMissions.length) { showMsg('No active missions.'); return; }
  const lines = activeMissions.map(a => {
    const destId = a.travelStel != null ? a.travelStel : a.returnStel;
    const dest = destId != null
      ? `${stelName(destId)}${systOfSpob(spobById(destId)) ? ' (' + systOfSpob(spobById(destId)).name + ')' : ''}`
      : '—';
    const days = a.timeLimit > 0 ? `, ${Math.max(0, a.timeLimit - (gameDay - a.accepted))}d left` : '';
    const goal = a.shipsLeft > 0 ? `${a.shipsLeft} ships remain` :
                 a.cargoName ? `deliver ${a.cargoQty}t ${a.cargoName}` : `go to ${dest}`;
    return `${a.name}: ${goal} → ${dest}${days}`;
  });
  showMsg(lines.join('  |  '));
}
function payMission(m) {
  const v = m.PayVal;
  if (v > 0) credits += v;
  else if (v >= -20255 && v <= -20128) { const oid = -v - 20000; if (DATA.types.outf[oid]) { outfits[oid] = (outfits[oid] || 0) + 1; applyShipStats(); } }
  else if (v >= -40099 && v <= -40001) credits = Math.round(credits * (1 - (-v - 40000) / 100));
  // -10128..-10255 clean legal record: reputation reset with that govt
  else if (v >= -10255 && v <= -10128) reputation[-v - 10000] = Math.max(0, reputation[-v - 10000] || 0);
}

/* Classic shop layout. Menu-sheet thumbnails: outfit i (id−128) lives at
 * cell (i%8, ⌊i/8⌋) of PICT 6100; ships likewise in PICT 5100. Large
 * 100×100 dialog art: outfit → PICT 6000+i, ship → PICT 5000+i. */
let selOutfitId = null, selShipId = null;

/* Only items actually available here are shown — no empty or grayed
 * slots (the grid compacts; each thumbnail is still sliced from the
 * item's fixed cell in the original menu sheet). */
function shopGrid(sheet, items, selId, clickFn) {
  let html = `<div class="shopgrid">`;
  for (const { id } of items) {
    const i = id - 128;
    html += `<button class="cell${id === selId ? ' sel' : ''}"
      style="background-image:url(evassets/graphics/${sheet});
             background-position:-${(i % 8) * 32}px -${Math.floor(i / 8) * 32}px"
      onclick="${clickFn}(${id})"></button>`;
  }
  return html + `</div>`;
}

/* Would this spob's shop have anything to show? Gates both the dialog
 * and the button on the landing screen. */
function outfitterStock(p) {
  return Object.entries(DATA.types.outf).filter(([id, o]) =>
    o.MissionBit < 0 && (techAvailable(o.TechLevel, p) || (outfits[id] || 0) > 0));
}
function shipyardStock(p) {
  return Object.entries(ships).filter(([, r]) =>
    r.MissionBit < 0 && techAvailable(r.TechLevel, p));
}

function selectOutfit(id) { selOutfitId = id; rerenderService(); }
function selectShip(id) { selShipId = id; rerenderService(); }

SERVICE_RENDER.outfitter = function () {
  const p = landedAt;
  const s = effectiveShip();
  const items = outfitterStock(p).map(([id]) => ({ id: +id }));

      <h3>${outfitName(selOutfitId)}</h3>
      <div class="row">${o.$sem ? o.$sem.modType : ''}${o.Max > 0 ? ` · max ${o.Max}` : ''}</div>
      <div class="row">Cost: <b>${o.Cost.toLocaleString('en-US')}</b> cr</div>

      <div style="margin-top:10px">

    walletHtml();
};

/* ---- shipyard ---- */

const shipyardName = id => DATA.strings[5001].list[id - 128] ||
  (ships[id] ? ships[id].name : null);

/* Trade-in per the resource bible: "the cost of buying a ship is always
 * the cost of the new ship minus 25% of the original cost of your current
 * ship and upgrades." */
function tradeInValue() {
  return Math.round(0.25 * (ships[playerShipId].Cost +
    Object.entries(outfits).reduce((n, [oid, c]) =>
      n + (DATA.types.outf[oid] ? DATA.types.outf[oid].Cost * c : 0), 0)));
}
function buyShip(id) {
  const rec = ships[id];
  if (!rec || id === playerShipId) return;
  const refund = tradeInValue();
  const price = rec.Cost - refund;
  if (credits < price) return;
  if (cargoUsed() > rec.Holds) { showMsg('Your cargo would not fit aboard.'); return; }
  credits -= price;
  playerShipId = id;
  player.shipId = id;
  for (const k of Object.keys(outfits)) delete outfits[k];
  applyShipStats();
  fuel = fuelMax;
  preloadSprites(new Set([spinOfShip(id)]));
  showMsg(`${shipyardName(id)} purchased. Old hull and outfits traded in.`);
  rerenderService();
}

SERVICE_RENDER.shipyard = function () {
  const p = landedAt;
  const refund = tradeInValue();
  const items = shipyardStock(p).map(([id]) => ({ id: +id }));
  if (selShipId == null || !items.some(x => x.id === selShipId))
    selShipId = items.length ? items[0].id : null;

  let pane = '';
  if (selShipId != null) {
    const r = ships[selShipId];
    const own = selShipId === playerShipId;
    const net = r.Cost - refund;
    pane = `<div class="shoppane">
      <img src="evassets/graphics/PICT_${5000 + (selShipId - 128)}.png" onerror="this.style.visibility='hidden'">
      <h3>${shipyardName(selShipId)}${own ? ' <span class="meta" style="margin:0">(current)</span>' : ''}</h3>
      <div class="row">Cost: <b>${r.Cost.toLocaleString('en-US')}</b> cr` +
      (own ? '' : ` · net <b>${net.toLocaleString('en-US')}</b>`) + `</div>
      <div class="row">Shield <b>${r.Shield}</b> · Armor <b>${r.Armor}</b></div>
      <div class="row">Speed <b>${r.Speed}</b> · Accel <b>${r.Accel}</b> · Turn <b>${r.Maneuver}</b></div>
      <div class="row">Cargo <b>${r.Holds}</b>t · Outfit space <b>${r.FreeMass}</b>t</div>
      <div class="row">Fuel <b>${r.Fuel / 100}</b> jumps · Crew <b>${r.Crew}</b></div>
      <div class="row">Guns <b>${r.MaxGun}</b> · Turrets <b>${r.MaxTur}</b></div>
      <div style="margin-top:10px">
        <button class="svc" onclick="buyShip(${selShipId})" ${own || credits < net ? 'disabled' : ''}>Buy</button>
      </div></div>`;
  }
  document.getElementById('serviceCard').innerHTML =
    `<h2>Shipyard</h2><div class="meta">${p.name} · tech ${p.TechLevel} ·
       trade-in: 25% of hull + upgrades (${refund.toLocaleString('en-US')} cr)</div>
     <div class="shop">${shopGrid('PICT_5100.png', items, selShipId, 'selectShip')}${pane}</div>` +
    walletHtml();
};

/* ---- mission bar / computer dialog ---- */

let selMisnId = null;
function stelName(id) { const p = spobById(id); return p && p.name ? p.name : (id != null ? 'stellar ' + id : '—'); }

function renderMissionBoard(loc) { // loc 0 = computer, 1 = bar
  const p = landedAt;
  const offers = offeredMissions(p, loc);
  const active = activeMissions;
  if (selMisnId == null || !offers.some(o => o.id === selMisnId))
    selMisnId = offers.length ? offers[0].id : null;
  const sel = selMisnId != null ? misns[selMisnId] : null;

  let list = '<div style="flex:1;min-width:210px;max-height:340px;overflow-y:auto">';
  if (active.length) {
    list += `<div class="meta" style="margin:0 0 4px">Active missions</div>`;
    for (const a of active) {
      const days = a.timeLimit > 0 ? ` <span class="sub">(${Math.max(0, a.timeLimit - (gameDay - a.accepted))}d left)</span>` : '';
      list += `<div class="row" style="color:#98c379">${misnName(misns[a.id], a)}${days}</div>`;
    }
    list += `<hr style="border-color:#26304a;margin:8px 0">`;
  }
  list += `<div class="meta" style="margin:0 0 4px">Available here (${offers.length})</div>`;
  if (!offers.length) list += `<div class="sub">Nothing right now.</div>`;
  for (const o of offers)
    list += `<div class="row" style="cursor:pointer;color:${o.id === selMisnId ? '#ffd479' : '#cfd6e4'}"
      onclick="selMisnId=${o.id};rerenderService()">${misnName(o, getOffer(o, p))}</div>`;
  list += '</div>';

  let pane = '<div style="flex:1.3;min-width:240px">';
  if (sel) {
    const offer = getOffer(sel, p);                      // resolved once, stable
    const brief = descText(sel.BriefText, offer) || descText(sel.QuickBrief, offer)
      || 'No further details are offered.';
    const pay = sel.PayVal > 0 ? `${sel.PayVal.toLocaleString('en-US')} cr` :
      sel.PayVal <= -20128 && sel.PayVal >= -20255 ? 'an outfit' : 'see briefing';
    const goalTxt = ['Destroy the ships', null, 'Board', 'Escort', 'Observe', 'Rescue', 'Drive off the ships'][sel.ShipGoal] || null;
    // Delivery missions go to the destination; return-only missions come back here.
    const destId = offer.travelStel != null ? offer.travelStel : offer.returnStel;
    const destShown = destId != null
      ? `${stelName(destId)}${systOfSpob(spobById(destId)) ? ' (' + systOfSpob(spobById(destId)).name + ')' : ''}`
        + (destId === p.id ? ' — return here' : '')
      : 'no fixed destination';
    pane += `<h3>${misnName(sel, offer)}</h3>
      <div class="desc" style="max-height:150px;overflow-y:auto">${brief}</div>
      <div class="row">Destination: <b>${destShown}</b></div>` +
      (offer.cargoName && offer.cargoQty ? `<div class="row">Cargo: <b>${offer.cargoQty}t ${offer.cargoName}</b></div>` : '') +
      (sel.ShipCount > 0 && goalTxt ? `<div class="row">Objective: <b>${goalTxt}</b> (${sel.ShipCount})</div>` : '') +
      (offer.deadline != null ? `<div class="row">Deliver by: <b>${formatDate(offer.deadline)}</b> <span class="sub">(${sel.TimeLimit} days)</span></div>` : '') +
      `<div class="row">Pay: <b>${pay}</b></div>
      <div style="margin-top:10px">
        <button class="svc" onclick="doAcceptMission(${sel.id})">Accept</button>
      </div>`;
  } else if (active.length) {
    pane += `<div class="sub">Select an available mission, or check your active missions (press I in flight for the briefing).</div>`;
  } else {
    pane += `<div class="sub">No missions are available here right now. Try the ${loc === 0 ? 'bar' : 'mission computer'}, or another world.</div>`;
  }
  pane += '</div>';

  document.getElementById('serviceCard').innerHTML =
    `<h2>${loc === 0 ? 'Mission Computer' : 'Spaceport Bar'}</h2>
     <div class="meta">${p.name}</div>
     <div class="shop">${list}${pane}</div>
     <div class="wallet">${credits.toLocaleString('en-US')} credits · cargo ${cargoUsed()}/${holds} tons · day ${gameDay}</div>
     <div style="margin-top:10px"><button class="svc" onclick="closeService()">Done (Esc)</button></div>`;
}
SERVICE_RENDER.bar = () => renderMissionBoard(1);
SERVICE_RENDER.missioncomputer = () => renderMissionBoard(0);

function doAcceptMission(id) {
  const m = misns[id];
  const need = (m.CargoType >= 0 && m.CargoQty && m.PickupMode === 0)
    ? (m.CargoQty <= -2 ? Math.abs(m.CargoQty) : m.CargoQty) : 0;
  if (need > holds - cargoUsed()) { showMsg('Not enough cargo space for this mission.'); return; }
  acceptMission(id, landedAt);
  savePilot(landedAt.id);
  rerenderService();
}

let missionNotes = []; // dialog text queued by the last landing
function renderPlanetScreen() {
  const p = landedAt;
  const m = p.$sem || {};
  const desc = DATA.types.desc[p.id];
  const compOffers = offeredMissions(p, 0).length;
  const barOffers = offeredMissions(p, 1).length;
  const svc = ['commodityExchange', 'outfitter', 'shipyard', 'bar']
    .filter(k => m[k])
    .filter(k => k !== 'outfitter' || outfitterStock(p).length)  // flags lie on
    .filter(k => k !== 'shipyard' || shipyardStock(p).length)    // low-tech worlds
    .map(k => ({ commodityExchange: 'trade center', outfitter: 'outfitter',
      shipyard: 'shipyard', bar: 'bar' }[k])).join(' · ');
  // Landscape: CustPicID overrides; standard is PICT (10000 + Type) in EV
  // Titles — 34 landscapes matching the 34 stellar types. If a custom PICT
  // is missing from the data (e.g. Darkstar's 11001 in 1.0.5), fall back
  // to the standard, then give up.
  const scape = p.CustPicID >= 0 ? p.CustPicID : 10000 + p.Type;
  let html = `<img class="scape" src="evassets/titles/PICT_${scape}.png"
    data-fb="${10000 + p.Type}" onerror="
      if (this.dataset.fb && !this.src.endsWith('PICT_' + this.dataset.fb + '.png'))
        this.src = 'evassets/titles/PICT_' + this.dataset.fb + '.png';
      else this.remove()">`;
  html += `<h2>${p.name}</h2>
    <div class="meta">${(m.stellarType || '').replace(/[()]/g, '')}` +
    `${m.govt ? ' · ' + m.govt : ''}${svc ? ' · ' + svc : ''} · fuel topped up</div>
    <div class="desc">${desc && desc.Description ? desc.Description : ''}</div>`;
  // mission events from this landing (deliveries, completions) shown up top
  for (const note of missionNotes)
    html += `<div class="desc" style="color:#98c379;border-left:2px solid #98c379;padding-left:8px">${note}</div>`;
  // services row — a shop with nothing to show doesn't get a button
  html += `<div>` +
    (m.commodityExchange ? `<button class="svc" onclick="openService('exchange')">Commodity Exchange</button>` : '') +
    (m.outfitter && outfitterStock(p).length ? `<button class="svc" onclick="openService('outfitter')">Outfitter</button>` : '') +
    (m.shipyard && shipyardStock(p).length ? `<button class="svc" onclick="openService('shipyard')">Shipyard</button>` : '') +
    (m.bar ? `<button class="svc" onclick="openService('bar')">Spaceport Bar${barOffers ? ` (${barOffers})` : ''}</button>` : '') +
    (m.canLand && compOffers ? `<button class="svc" onclick="openService('missioncomputer')">Mission BBS (${compOffers})</button>` : '') +
    `</div>`;
  html += `<div class="wallet"><b>${credits.toLocaleString('en-US')}</b> credits ·
    cargo ${cargoUsed()}/${holds} tons${activeMissions.length ? ` · ${activeMissions.length} active mission${activeMissions.length > 1 ? 's' : ''}` : ''}</div>
    <div class="hint">Press Esc to take off</div>`;
  document.getElementById('landedCard').innerHTML = html;
}

/* L: select the nearest landable planet (brackets show it), or — if it's
 * already the target and we're in range and slow — land. Denials explain
 * themselves, like the original. */
function tryLand() {
  if (landedAt || jump) return;
  const p = (navTarget && (!navTarget.$sem || navTarget.$sem.canLand))
    ? navTarget : nearestLandable();
  if (!p) { showMsg('There is nowhere to land in this system.'); return; }
  if (navTarget !== p) { navTarget = p; showMsg(`Targeting ${p.name}.`); return; }
  if (distTo(p) >= EV.LAND_DIST) { showMsg(`Landing on ${p.name}: too far away.`); return; }
  if (Math.hypot(player.vx, player.vy) > EV.LAND_SPEED) {
    showMsg('You are moving too fast to land.'); return;
  }
  landedAt = p;
  player.vx = player.vy = 0;
  fuel = fuelMax; // landing refuels (spec)
  player.shields = player.shieldMax; // ...and repairs
  player.armor = player.armorMax;
  player.disabled = false;
  rebuildPlayerWeapons(); // rearm (simplification: ammo refills on landing)
  stopAllLoops();
  if (p.CustSndID >= 0) ambientSnd = loopSnd(p.CustSndID, 0.6); // planet ambient
  missionNotes = missionLandingEvents(p); // cargo pickup/dropoff, completion
  savePilot(p.id); // classic: the game saves when you land (after mission events)
  renderPlanetScreen();
  document.getElementById('landed').style.display = 'flex';
}
function takeOff() {
  if (!landedAt) return;
  if (serviceOpen) closeService();
  savePilot(landedAt.id); // captures docked purchases/trades
  stopAllLoops();
  EV.placeAtTakeoff(player, landedAt);
  navTarget = null; // fresh start off the pad — no stale landing target
  landedAt = null;
  missionNotes = [];
  maybeSpawnMissionShips && activeMissions.forEach(maybeSpawnMissionShips); // ships that follow the player
  document.getElementById('landed').style.display = 'none';
}

/* ---------------- logic step (30Hz) ---------------- */

function maxWeaponRange(e) {
  let r = 0;
  for (const w of e.weapons)
    if (w.rec.Guidance !== 99)
      r = Math.max(r, w.rec.Guidance === 0 || w.rec.Guidance === 3
        ? w.rec.Speed : EV.shotSpeedOf(w.rec) * w.rec.Count);
  return r;
}

function step() {
  if (gameOver) return;
  if (!landedAt) {
    if (jump && player.deathT >= 0) abortJump(); // no jumping out of a fireball
    if (jump && jump.phase === 'engage') {
      const ready = EV.stepJumpEngage(player, mapBearingTo(jump.destId));
      jump.t++;
      // spec: aligned+fast AND drive spun up AND clear of stellars
      if (ready && jump.t >= EV.JUMP_WARMUP_FRAMES &&
          nearestSpobInfo().dist >= EV.JUMP_MIN_DIST)
        jump = { destId: jump.destId, phase: 'streak', t: 0 };
    } else if (jump && jump.phase === 'streak') {
      EV.thrust(player); EV.integrate(player);
      if (++jump.t >= EV.JUMP_STREAK_FRAMES) completeJump();
    } else if (player.disabled) {
      EV.integrate(player); // dead in the water — classic would let you be boarded
    } else if (player.deathT >= 0) {
      EV.integrate(player);
      if (--player.deathT <= 0) {
        spawnExplosion(player.x, player.y, player.deathDelay >= 60 ? 2 : 1);
        playSnd(303);
        stopAllLoops();
        gameOver = true;
        let hasPilot = false;
        try { hasPilot = !TEST_MODE && !!localStorage.getItem('ve_pilot'); } catch {}
        document.getElementById('deadHint').textContent = hasPilot
          ? 'R: return to your last landing \u00b7 N: new pilot'
          : 'Press R to try again';
        document.getElementById('dead').style.display = 'flex';
      }
    } else {
      EV.stepPlayer(player, {
        left: keys['arrowleft'] || keys['a'],
        right: keys['arrowright'] || keys['d'],
        retro: keys['arrowdown'] || keys['s'],
        thrust: keys['arrowup'] || keys['w'],
      });
      EV.stepShields(player, player.shieldMax, player.shieldRe);
      for (const w of player.weapons) if (w.cool > 0) w.cool--;
      if (keys[' ']) fire(player, shipTarget, true);
      if (keys['x'] && player.selSecondary) fire(player, shipTarget, false);
      /* klaxxon on shield collapse, re-armed on recovery */
      if (player.shields <= 0 && klaxxonArmed) { playSnd(350, 0.8); klaxxonArmed = false; }
      else if (player.shields > player.shieldMax * 0.25) klaxxonArmed = true;
    }
  }

  for (const s of [...aiShips]) {
    if (s.deathT >= 0) {                       // disintegrating
      EV.integrate(s);
      if (--s.deathT <= 0) {
        spawnExplosion(s.x, s.y, s.deathDelay >= 60 ? 2 : 1);
        playSnd(303, attenuate(s.x, s.y)); // the final boom
        if (s.misnId != null) onMissionShipDestroyed(s);
        aiShips.splice(aiShips.indexOf(s), 1);
        if (shipTarget === s) shipTarget = null;
        const epoch = systEpoch;
        setTimeout(() => { if (epoch === systEpoch) spawnAI(true); }, 4000 + Math.random() * 8000);
      }
      continue;
    }
    if (s.disabled) { EV.integrate(s); continue; }
    EV.stepShields(s, s.shieldMax, s.shieldRe);
    for (const w of s.weapons) if (w.cool > 0) w.cool--;
    if (s.hostile && player.deathT < 0 && !gameOver && !landedAt) {
      const r = EV.stepWarship(s, player.x, player.y);
      if (r.aligned && r.dist < maxWeaponRange(s)) fire(s, player, true);
    } else if (s.fleeing) {
      EV.stepFlee(s, player.x, player.y);
    } else if (!EV.stepTrader(s, s.target)) {
      // Reached its target spob and faded.
      if (s.misnId != null && !s.escort) {
        // A catch-goal target (board/disable/destroy) mustn't slip away by
        // landing — loiter near the spob instead of despawning.
        s.target = spobs.length ? spobs[Math.floor(Math.random() * spobs.length)] : null;
        s.state = 'cruise'; s.fade = 1;
      } else {
        if (s.misnId != null && s.escort) onMissionEscortArrived(s);
        aiShips.splice(aiShips.indexOf(s), 1);
        if (shipTarget === s) shipTarget = null;
        if (s.misnId == null) {
          const epoch = systEpoch;
          setTimeout(() => { if (epoch === systEpoch) spawnAI(Math.random() < 0.5); },
            2000 + Math.random() * 6000);
        }
      }
    }
  }

  /* shots */
  const everyone = player.deathT < 0 && !landedAt && !gameOver ? [player, ...aiShips] : [...aiShips];
  for (const shot of [...shots]) {
    const alive = EV.stepShot(shot, shot.homing);
    let hit = false;
    for (const v of everyone) {
      if (v === shot.owner || v.deathT >= 0) continue;
      if (Math.hypot(v.x - shot.x, v.y - shot.y) <
          Math.max(shot.rec.ProxRadius, shipHalf(v))) {
        hitShip(v, shot.rec, shot.heading, shot.owner);
        if (shot.rec.ExplodType >= 0) spawnExplosion(shot.x, shot.y, shot.rec.ExplodType);
        hit = true;
        break;
      }
    }
    if (hit || !alive) shots.splice(shots.indexOf(shot), 1);
  }

  /* beams: ray from owner's nose, damage first ship within 8 px */
  for (const b of [...beams]) {
    if (b.owner.deathT >= 0 || --b.life <= 0) { beams.splice(beams.indexOf(b), 1); continue; }
    b.heading = b.turreted && b.target ? EV.bearing(b.target.x - b.owner.x, b.target.y - b.owner.y)
                                       : b.owner.heading;
    const dx = Math.sin(EV.rad(b.heading)), dy = -Math.cos(EV.rad(b.heading));
    let bestT = Infinity, bestV = null;
    for (const v of everyone) {
      if (v === b.owner || v.deathT >= 0) continue;
      const t = (v.x - b.owner.x) * dx + (v.y - b.owner.y) * dy;
      if (t < 0 || t > b.rec.Speed) continue;
      const px = b.owner.x + dx * t, py = b.owner.y + dy * t;
      if (Math.hypot(v.x - px, v.y - py) < 8 + shipHalf(v) / 2 && t < bestT) { bestT = t; bestV = v; }
    }
    b.len = bestV ? bestT : b.rec.Speed;
    if (bestV) hitShip(bestV, b.rec, b.heading, b.owner);
  }

  /* explosions */
  for (const ex of [...explosions]) {
    if (++ex.tick % 2 === 0 && ++ex.f >= ex.frames)
      explosions.splice(explosions.indexOf(ex), 1);
  }
}

/* ---------------- rendering ---------------- */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
}
addEventListener('resize', resize); resize();

function starsIn(cx, cy, layer) {
  let h = (cx * 73856093) ^ (cy * 19349663) ^ (layer * 83492791);
  const out = [];
  for (let i = 0; i < 5; i++) {
    h = (h * 1103515245 + 12345) & 0x7fffffff;
    const x = (h % 512); h = (h * 1103515245 + 12345) & 0x7fffffff;
    const y = (h % 512); h = (h * 1103515245 + 12345) & 0x7fffffff;
    out.push([x, y, (h % 3) === 0 ? 2 : 1]);
  }
  return out;
}
function drawStars(camX, camY, w, h, streak) {
  for (const [layer, par, alpha] of [[1, 0.3, 0.5], [2, 0.6, 0.9]]) {
    const ox = camX * par, oy = camY * par;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.strokeStyle = `rgba(200,220,255,${alpha})`;
    const c0x = Math.floor((ox - w / 2) / 512), c1x = Math.floor((ox + w / 2) / 512);
    const c0y = Math.floor((oy - h / 2) / 512), c1y = Math.floor((oy + h / 2) / 512);
    for (let cx = c0x; cx <= c1x; cx++)
      for (let cy = c0y; cy <= c1y; cy++)
        for (const [sx, sy, r] of starsIn(cx, cy, layer)) {
          const x = cx * 512 + sx - ox + w / 2, y = cy * 512 + sy - oy + h / 2;
          if (x < -20 || x > w + 20 || y < -20 || y > h + 20) continue;
          if (streak > 0) {
            const a = EV.rad(player.heading);
            const len = streak * 6 * par;
            ctx.beginPath(); ctx.moveTo(x, y);
            ctx.lineTo(x - Math.sin(a) * len, y + Math.cos(a) * len);
            ctx.stroke();
          } else ctx.fillRect(x, y, r, r);
        }
  }
}

function radarColor(govtId) {
  if (govtId == null || govtId < 0) return '#9aa5b8';
  const hues = ['#e5c07b', '#61afef', '#e06c75', '#98c379', '#c678dd', '#56b6c2'];
  return hues[(govtId - 128) % hues.length];
}

function drawFlame(ship, x, y) {
  if (!ship.thrusting) return;
  const a = EV.rad(ship.heading);
  const meta = (sprites.get(spinOfShip(ship.shipId)) || {}).meta;
  const off = ((meta ? meta.frameH : 24) / 2) + 3;
  ctx.save();
  ctx.translate(x - Math.sin(a) * off, y + Math.cos(a) * off);
  ctx.rotate(a);
  ctx.fillStyle = 'rgba(255,170,60,.85)';
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.lineTo(3, 0); ctx.lineTo(0, 7 + Math.random() * 4);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Classic-style corner brackets around a target.
function drawBrackets(x, y, half, color) {
  const arm = Math.max(6, half * 0.45);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  for (const [sx, sy] of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
    ctx.beginPath();
    ctx.moveTo(x + sx * half, y + sy * (half - arm));
    ctx.lineTo(x + sx * half, y + sy * half);
    ctx.lineTo(x + sx * (half - arm), y + sy * half);
    ctx.stroke();
  }
}
function spriteHalf(spinId, fallback) {
  const m = (sprites.get(spinId) || {}).meta;
  return (m ? Math.max(m.frameW, m.frameH) : fallback) / 2 + 6;
}

/* ---- classic sidebar: PICT 128 "Game Panel" (144×480) from EV Titles.
 * Box geometry measured from the asset: radar y3–138, shield/fuel bar
 * slots at x60–134 / y154 & y170, message box y190–227, status strip
 * y235–254, target display y262–378, cargo box y386–476; content x5–138. */
const panelImg = (() => {

{

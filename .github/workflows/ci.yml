# Continuous integration for Vₑ. Runs the data-free checks: ESLint, the
# node:test engine suite, and the esbuild bundle builds (which validate the
# whole ES-module graph). flight.html / galaxy.html and loader/verify.js are
# NOT built here — they need the copyrighted EV_data, which never lives in CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build engine + shell bundles
        run: make engine/core.bundle.js engine/shell.bundle.js
